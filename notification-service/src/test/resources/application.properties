# Don't reach out to Config Server / Eureka during tests
spring.cloud.config.enabled=false
eureka.client.enabled=false

# Point Spring Kafka at the in-memory broker started by @EmbeddedKafka
spring.kafka.bootstrap-servers=${spring.embedded.kafka.brokers}

spring.kafka.consumer.group-id=test-notification-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=ru.aston.common.UserEventDto
spring.kafka.consumer.properties.spring.json.trusted.packages=ru.aston.common

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
